<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SPREAD</title>
  <!--
    GitHub Pages SPA redirect.

    GitHub Pages is a static file host — it has no knowledge of our
    client-side React router. When a visitor deep-links to
    `/Web.26-/platform`, there is no `platform/index.html` on disk,
    so Pages returns this 404 page.

    The trick: instead of showing a 404, we rewrite the URL to
    `/Web.26-/?/platform` and reload. That hits `index.html`
    (which DOES exist), and a tiny decoder in index.html converts
    the query-string back into a real pathname before React boots,
    so the router sees the path the user actually asked for.

    Based on rafgraph/spa-github-pages (MIT).
  -->
  <script>
    (function () {
      // How many path segments are part of the repo base.
      // We're served at `basturmabanketnaya.github.io/Web.26-/` so it's 1.
      var segmentCount = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body></body>
</html>
